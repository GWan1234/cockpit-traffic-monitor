name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.7.2)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update version
        run: |
          sed -i "s/\"version\":.*\"[^\"]*\"/\"version\": \"${{ inputs.version }}\"/" manifest.json
          echo "Version set to ${{ inputs.version }}"

      - name: Build deb
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            cockpit-traffic-monitor v${{ inputs.version }}
            
            Install:
            ```
            sudo dpkg -i cockpit-traffic-monitor_${{ inputs.version }}_all.deb
            ```
          files: cockpit-traffic-monitor_${{ inputs.version }}_all.deb
          generate_release_notes: true
