name: Build & Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm build (yes/no)'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(grep '"version"' manifest.json | grep -oP '[\d.]+')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build deb
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            cockpit-traffic-monitor v${{ steps.version.outputs.version }}
            
            Install:
            ```
            sudo dpkg -i cockpit-traffic-monitor_${{ steps.version.outputs.version }}_all.deb
            ```
          files: |
            cockpit-traffic-monitor_${{ steps.version.outputs.version }}_all.deb
          generate_release_notes: true
